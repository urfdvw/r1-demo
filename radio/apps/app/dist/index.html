<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=240, height=320, user-scalable=no, initial-scale=1.0">
    <title>UI Experimenter App</title>
    
  <script type="module" crossorigin src="./assets/main-ac1a8f67.js"></script>
  <link rel="stylesheet" href="./assets/index-afdab802.css">
</head>
<body>
    <div id="app">
        <h1>Web Radio</h1>
        <div class="radio-container">
            <button id="scanQrBtn" class="control-btn scan-btn">Scan Station QR</button>
            
            <button id="playStopBtn" class="control-btn">Play</button>
            
            <div class="metadata-display">
                <div class="status" id="status">Stopped</div>
                <div class="volume" id="volume">Volume: 70%</div>
                <div class="track-info" id="trackInfo"></div>
            </div>
        </div>

        <div id="scannerModal" class="scanner-modal hidden">
            <div class="scanner-content">
                <video id="scannerVideo" class="scanner-video" autoplay playsinline muted></video>
                <div id="scannerStatus" class="scanner-status">Point camera at station QR</div>
                <button id="closeScannerBtn" class="control-btn scanner-close-btn">Cancel</button>
            </div>
        </div>
    </div>
    
</body>
</html>
